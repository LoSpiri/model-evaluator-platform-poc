name: CI — Platform Integration Tests

on:
  pull_request:
    paths:
      - "platform/**"
      - "docker-compose.yml"

jobs:
  test-platform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Run platform integration tests
        run: devbox run test:platform
