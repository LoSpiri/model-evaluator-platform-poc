name: Build and Evaluate Model

on:
  push:
    tags:
      - "model-*/v*.*.*"

jobs:
  build-and-evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PLATFORM_URL: ${{ secrets.PLATFORM_URL || vars.PLATFORM_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          MODEL_NAME="${TAG%/v*}"
          VERSION="${TAG#*/}"
          echo "model_name=$MODEL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tar_filename=${MODEL_NAME}-${VERSION}.tar" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.parse.outputs.model_name }}:${{ steps.parse.outputs.version }}" \
            "models/${{ steps.parse.outputs.model_name }}/"

      - name: Save image to .tar
        run: |
          mkdir -p containers
          docker save \
            "${{ steps.parse.outputs.model_name }}:${{ steps.parse.outputs.version }}" \
            -o "containers/${{ steps.parse.outputs.tar_filename }}"

      - name: Commit .tar to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "containers/${{ steps.parse.outputs.tar_filename }}"
          git commit -m "ci: add ${{ steps.parse.outputs.tar_filename }}"
          git push origin HEAD:main

      - name: Register model with platform
        id: register
        if: ${{ env.PLATFORM_URL != '' }}
        run: |
          RESPONSE=$(curl -sf -X POST "${PLATFORM_URL}/api/models/register" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"${{ steps.parse.outputs.model_name }}\",
              \"version\": \"${{ steps.parse.outputs.version }}\",
              \"tar_filename\": \"${{ steps.parse.outputs.tar_filename }}\"
            }")
          MODEL_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "Registered model: $MODEL_ID"

      - name: Auto-evaluate model
        id: evaluate
        if: steps.register.outputs.model_id != ''
        run: |
          MODEL_ID="${{ steps.register.outputs.model_id }}"

          RESULT=$(curl -sf -X POST "${PLATFORM_URL}/api/models/${MODEL_ID}/evaluate" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            -d '{"n_samples": 50}')

          echo "result=$(echo "$RESULT" | jq -c '.')" >> "$GITHUB_OUTPUT"

          STATUS=$(echo "$RESULT" | jq -r '.status')
          echo "Evaluation status: $STATUS"

      - name: Write evaluation summary
        if: steps.evaluate.outputs.result != ''
        run: |
          RESULT='${{ steps.evaluate.outputs.result }}'
          MODEL_NAME="${{ steps.parse.outputs.model_name }}"
          VERSION="${{ steps.parse.outputs.version }}"

          STATUS=$(echo "$RESULT" | jq -r '.status')
          ACCURACY=$(echo "$RESULT" | jq -r '.accuracy // "N/A"')
          LATENCY=$(echo "$RESULT" | jq -r '.latency_ms // "N/A"')
          SAMPLES=$(echo "$RESULT" | jq -r '.extra_metrics.total_samples // "N/A"')
          ERROR=$(echo "$RESULT" | jq -r '.error // "none"')

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Evaluation Results: ${MODEL_NAME} ${VERSION}

          | Metric | Value |
          |--------|-------|
          | Status | \`${STATUS}\` |
          | Accuracy | ${ACCURACY} |
          | Latency | ${LATENCY} ms |
          | Samples | ${SAMPLES} |
          | Error | ${ERROR} |
          EOF
